# CI runs the same mise tasks as local development (see mise.toml).
name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.1
      - run: mise run check

  # PostgreSQL-dialect probes against the Spanner emulator (Docker via
  # spanemuboost/testcontainers). Nested module; not part of `mise run check`.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.6.1
      - run: mise run test-integration
